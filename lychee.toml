verbose = "info"
include_verbatim = false
include_fragments = true
max_redirects = 5
max_concurrency = 16
timeout = 20
retry_wait_time = 2
accept = ["200", "204", "301", "302", "403"]

exclude = [
  "^http://localhost",
  "^http://127\\.",
  "^https?://example\\.",
  "^https?://.*\\.local",
]

exclude_path = [".git", "node_modules", ".github", "target", "dist", "build"]
