name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  markdown-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Markdown structure (markdownlint-cli2)
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
      - name: Broken links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress './**/*.md'
          fail: true
          failIfEmpty: false
      - name: Typos (crate-ci/typos)
        uses: crate-ci/typos@v1.45.2
        with:
          config: typos.toml
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint (GitHub workflow YAML lint)
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest, cargo-machete
      - name: Build
        run: cargo build --all-targets --all-features --locked
      - name: Test (cargo-nextest)
        run: cargo nextest run --all-features --locked --no-tests=warn
      - name: Doctests (separate, nextest не покрывает)
        run: |
          if grep -q '^\[lib\]' Cargo.toml; then
            cargo test --doc --all-features --locked
          else
            echo "skip: no [lib] target — doctests N/A"
          fi
      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Format check
        run: cargo fmt --check
      - name: Doc check
        run: cargo doc --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Unused deps (cargo-machete)
        run: cargo machete
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-v8.30.1-linux-x64
      - name: Install gitleaks (with retry on transient CDN flake)
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | sudo tar xz -C /usr/local/bin gitleaks
            sudo chmod +x /usr/local/bin/gitleaks
      - name: Secret scan (gitleaks)
        run: gitleaks detect --config .gitleaks.toml --no-banner --redact --exit-code 1
  rust-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny, cargo-audit
      - name: cargo-audit (RustSec advisories)
        run: cargo audit
      - name: cargo-deny (licenses / bans / sources)
        run: cargo deny check
